<!DOCTYPE html>
<!-- ملف التخطيط الأساسي (Layout) للموقع -->
<!-- يستخدم Thymeleaf Layout Dialect لتوحيد هيكل الصفحات -->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- عنوان ديناميكي للصفحات الفرعية -->
    <title layout:title-pattern="$DECORATOR_TITLE - $CONTENT_TITLE">منصة الكتابات الجادة</title>

    <!-- Bootstrap 5 (نسخة RTL) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../static/css/style.css">

    <!-- ملفات CSS الرئيسية للمشروع -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <!-- يمكن إضافة ملفات CSS خاصة بالصفحات لاحقاً داخل كل صفحة على حدة -->
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- ========== الهيدر (من ملف منفصل) ========== -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- ========== المحتوى الرئيسي (تقوم الصفحات الفرعية بحقنه هنا) ========== -->
    <main class="flex-grow-1">
        <div class="container py-4" layout:fragment="content">
            <!-- المحتوى الافتراضي في حال عدم وجود صفحة فرعية -->
            <p>مرحباً بك في منصة الكتابات الجادة</p>
        </div>
    </main>

    <!-- ========== الفوتر (من ملف منفصل) ========== -->
    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{templates/fragments/header :: header}"></div>

    <!-- ========== سكربتات Bootstrap ========== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- ملف JavaScript مخصص للمشروع (اختياري) -->
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
