spring.application.name=blogplatform
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

server.port=${PORT:8080}

spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# إعدادات السيرفر والجلسة
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=AMQSESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
server.servlet.session.tracking-modes=cookie

# حل مشكلة الجلسة في البيئات المستضافة
server.forward-headers-strategy=native

# لعرض تفاصيل الخطأ
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=always
spring.web.error.include-exception=true

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG